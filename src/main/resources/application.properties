# Server configuration
server.port=${PORT:8081}

# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:campusdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Console access
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Logging
logging.level.root=INFO
logging.level.com.smartcampus=INFO
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.springframework=INFO
logging.level.org.springframework.security=ERROR
logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=ERROR

# Thymeleaf
spring.thymeleaf.cache=false

# Error handling
server.error.whitelabel.enabled=false
